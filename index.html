<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Homework App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bgDark: '#0B1121', panelDark: '#131C31', panelHover: '#1E293B', textLight: '#F8FAFC', textMuted: '#94A3B8', accentBlue: '#3B82F6', accentCyan: '#06B6D4', dangerPink: '#F43F5E' },
                    fontFamily: { heading: ['Space Grotesk', 'sans-serif'], body: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background: #050811; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        #phone-frame { width: 375px; height: 812px; background: #0B1121; border-radius: 40px; border: 12px solid #000; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(59,130,246,0.15); }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 50; }
        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        /* Confetti */
        .confetti { position: absolute; width: 8px; height: 8px; background-color: #3B82F6; opacity: 0; }
        @keyframes fall { 0% { opacity: 1; transform: translateY(-50px) rotate(0deg); } 100% { opacity: 0; transform: translateY(800px) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="phone-frame">
        <div class="notch"></div>
        
        <!-- UI Header -->
        <header class="pt-12 pb-4 px-6 bg-panelDark border-b border-panelHover flex justify-between items-center z-40 relative">
            <div class="font-heading font-bold text-accentBlue text-sm tracking-widest uppercase">WOLF<span class="text-textLight">HW</span></div>
            <div class="text-xs font-mono text-textMuted" id="q-counter">Q 1/15</div>
        </header>

        <!-- Progress Bar -->
        <div class="h-1 bg-bgDark w-full">
            <div id="progress-bar" class="h-full bg-accentBlue transition-all duration-300 shadow-[0_0_8px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
        </div>

        <!-- Main Content -->
        <main id="app-content" class="p-6 h-[calc(100%-100px)] overflow-y-auto relative text-textLight">
            <!-- Start Screen -->
            <div id="screen-start" class="flex flex-col items-center justify-center h-full text-center fade-in">
                <i class="fa-solid fa-bed-pulse text-7xl text-accentBlue mb-6" style="text-shadow: 0 0 20px rgba(59,130,246,0.5);"></i>
                <h1 class="font-heading text-4xl font-black mb-2 uppercase tracking-tight">The Sleep Protocol</h1>
                <p class="text-textMuted mb-10 text-sm">Homework Module B2<br>Used to vs Be used to</p>
                <button onclick="startQuiz()" class="bg-accentBlue/20 text-accentBlue border border-accentBlue w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase text-lg shadow-lg hover:bg-accentBlue hover:text-bgDark transition-colors">START PROTOCOL</button>
            </div>

            <!-- Quiz Screen -->
            <div id="screen-quiz" class="hidden flex-col h-full fade-in">
                <div class="flex-1 flex flex-col justify-center">
                    <p id="question-text" class="font-body text-2xl font-medium mb-8 text-center leading-snug"></p>
                    <div id="options-container" class="flex flex-col gap-4">
                        <!-- Options injected here -->
                    </div>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="screen-result" class="hidden flex-col items-center justify-center h-full text-center fade-in z-10 relative">
                <div id="rank-icon" class="text-7xl mb-4 text-accentBlue" style="text-shadow: 0 0 20px rgba(59,130,246,0.4);"></div>
                <h2 class="font-heading text-5xl font-black mb-2 text-textLight" id="final-score"></h2>
                <p class="text-textMuted font-mono mb-8 uppercase tracking-widest text-sm" id="rank-title"></p>
                <div class="bg-panelDark p-5 rounded-2xl w-full border border-panelHover mb-8 shadow-inner text-left">
                    <p class="text-sm text-textLight leading-relaxed"><span class="text-accentBlue font-bold">Past Habit:</span> Used to + Verb.<br><span class="text-accentCyan font-bold">Present State:</span> Be used to + ING.<br><span class="text-textLight font-bold">Adapting:</span> Get used to + ING.</p>
                </div>
                <button onclick="location.reload()" class="bg-panelHover border border-textMuted text-textMuted w-full py-4 rounded-xl font-bold font-heading tracking-widest uppercase">REBOOT SYSTEM</button>
            </div>
        </main>
    </div>

    <script>
        const questions = [
            { q: "I _____ play video games all night, but now I go to bed at 10 PM.", o: ["am used to", "used to", "get used to"], a: 1 },
            { q: "She is _____ up early because she is a nurse.", o: ["used to waking", "used to wake", "use to wake"], a: 0 },
            { q: "I just moved to London. I am still _____ driving on the left.", o: ["getting used to", "used to", "using to"], a: 0 },
            { q: "My father _____ smoke, but he quit 10 years ago.", o: ["was used to", "used to", "is used to"], a: 1 },
            { q: "Don't worry about the noise. We _____ living near the airport.", o: ["are used to", "used to", "get used to"], a: 0 },
            { q: "He _____ have a perfect sleep score, but now he is stressed.", o: ["didn't used to", "used to", "is used to"], a: 1 },
            { q: "It's hard at first, but you will _____ eating dinner at 11 AM.", o: ["be used to", "get used to", "used to"], a: 1 },
            { q: "I _____ work in an office, but now I work from home.", o: ["used to", "am used to", "get used to"], a: 0 },
            { q: "Are you _____ the cold weather in Scotland yet?", o: ["use to", "used to", "get used to"], a: 1 },
            { q: "They didn't _____ care about their health, but now they do biohacking.", o: ["used to", "use to", "are used to"], a: 1 },
            { q: "I am a night owl. I will never _____ going to bed at 8:30 PM.", o: ["be used to", "get used to", "used to"], a: 1 },
            { q: "We _____ going to the gym every morning. It's our routine.", o: ["are used to", "used to", "get used to"], a: 0 },
            { q: "Did you _____ have blonde hair when you were a kid?", o: ["used to", "use to", "used"], a: 1 },
            { q: "The new software is difficult, but I am _____ it.", o: ["getting used to", "used to", "used"], a: 0 },
            { q: "He is a chef, so he _____ standing for long hours.", o: ["is used to", "used to", "gets used to"], a: 0 }
        ];

        let currentQ = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            document.getElementById('screen-quiz').style.display = 'flex';
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-counter').innerText = `Q ${currentQ + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQ) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-panelDark border border-panelHover text-left p-5 rounded-xl text-lg hover:border-accentBlue transition-colors';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx, q.a, btn, optsContainer);
                optsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selected, correct, btn, container) {
            Array.from(container.children).forEach(b => b.disabled = true);
            
            if (selected === correct) {
                btn.classList.add('bg-accentBlue', 'border-accentBlue', 'text-bgDark', 'font-bold');
                score++;
            } else {
                btn.classList.add('bg-dangerPink', 'border-dangerPink', 'text-textLight');
                container.children[correct].classList.add('border-accentBlue', 'text-accentBlue');
            }

            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    document.getElementById('screen-quiz').classList.remove('fade-in');
                    void document.getElementById('screen-quiz').offsetWidth; 
                    document.getElementById('screen-quiz').classList.add('fade-in');
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('screen-result').style.display = 'flex';
            document.getElementById('progress-bar').style.width = '100%';
            
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            
            let rank, icon;
            if (score === 15) { rank = 'BIOHACKER'; icon = '<i class="fa-solid fa-dna"></i>'; spawnConfetti(); }
            else if (score >= 10) { rank = 'PROFESSIONAL SLEEPER'; icon = '<i class="fa-solid fa-bed-pulse text-accentCyan"></i>'; }
            else { rank = 'NIGHT OWL'; icon = '<i class="fa-solid fa-moon text-textMuted"></i>'; }
            
            document.getElementById('rank-title').innerText = rank;
            document.getElementById('rank-icon').innerHTML = icon;
        }

        function spawnConfetti() {
            const container = document.getElementById('screen-result');
            const colors = ['#3B82F6', '#06B6D4', '#F8FAFC'];
            for(let i=0; i<40; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
                conf.style.animationDelay = Math.random() * 2 + 's';
                conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                container.appendChild(conf);
            }
        }
    </script>
</body>
</html>
